<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ADM | Rotas Algarve</title>

  <link rel="stylesheet" href="admin.css?v=15" />
</head>

<body>
  <div class="container">

    <header class="topo">
      <div>
        <span class="tag-sistema">Rotas Algarve</span>
        <h1>Painel ADM</h1>
        <p>Central de gestão do sistema.</p>
      </div>

      <div class="top-actions">
        <button type="button" class="btn-cinza" onclick="irMotorista()">Ver motorista</button>
        <button type="button" class="btn-vermelho" onclick="sair()">Sair</button>
      </div>
    </header>

    <main class="dashboard-grid">

      <button type="button" class="dashboard-card" onclick="window.location.href='motoristas.html'">
        <div class="dashboard-icone">🚐</div>
        <div>
          <h2>Motoristas</h2>
          <p>Pesquisar, cadastrar, editar, alterar senha e ativar/inativar.</p>
        </div>
        <span class="dashboard-seta">›</span>
      </button>

      <button type="button" class="dashboard-card" onclick="window.location.href='pontos.html'">
        <div class="dashboard-icone">📍</div>
        <div>
          <h2>Pontos Base</h2>
          <p>Cadastrar pontos no mapa, pesquisar e gerenciar pontos salvos.</p>
        </div>
        <span class="dashboard-seta">›</span>
      </button>

      <button type="button" class="dashboard-card" onclick="window.location.href='rotas.html'">
        <div class="dashboard-icone">🗺️</div>
        <div>
          <h2>Rotas</h2>
          <p>Criar rotas, adicionar pontos, abrir no Maps e gerenciar rotas salvas.</p>
        </div>
        <span class="dashboard-seta">›</span>
      </button>

    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js?v=15"></script>
</body>
</html>
