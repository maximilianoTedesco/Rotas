<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ADM | Rotas Algarve</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Painel ADM</h1>
      <p>Cadastro de rotas, pontos de coleta e destino final</p>

      <div class="top-actions">
        <button type="button" class="btn-azul" onclick="irMotorista()">
          Ver tela do motorista
        </button>

        <button type="button" class="btn-cinza" onclick="sair()">
          Sair
        </button>
      </div>
    </header>

    <section class="card">
      <h2>Dados da rota</h2>

      <label for="nomeRota">Nome da rota</label>
      <input
        type="text"
        id="nomeRota"
        placeholder="Ex: Rota Manhã Portimão - Hotéis"
      />

      <label for="dataRota">Data</label>
      <input type="date" id="dataRota" />

      <label for="horarioInicio">Horário inicial</label>
      <input type="time" id="horarioInicio" />

      <label for="destinoNome">Destino final</label>
      <input
        type="text"
        id="destinoNome"
        placeholder="Ex: Tivoli Carvoeiro"
      />

      <label for="destinoCoordenadas">Coordenadas do destino final</label>
      <input
        type="text"
        id="destinoCoordenadas"
        readonly
        placeholder="Clique em 'Selecionar destino final' e depois no mapa"
      />

      <button type="button" class="btn-verde" onclick="salvarRota()">
        Salvar / Atualizar rota
      </button>

      <p class="aviso" id="rotaAtualTexto">
        Nenhuma rota carregada.
      </p>
    </section>

    <section class="card">
      <h2>Adicionar ponto de coleta</h2>

      <label for="nomePonto">Nome do ponto</label>
      <input
        type="text"
        id="nomePonto"
        placeholder="Ex: Paragem Praia da Rocha"
      />

      <label for="coordenadas">Coordenadas selecionadas</label>
      <input
        type="text"
        id="coordenadas"
        readonly
        placeholder="Clique em 'Selecionar ponto de coleta' e depois no mapa"
      />

      <label>Selecionar no mapa</label>

      <div class="modo-mapa-box">
        <button type="button" class="btn-azul" onclick="setModoMapa('coleta')">
          Selecionar ponto de coleta
        </button>

        <button type="button" class="btn-cinza" onclick="setModoMapa('destino')">
          Selecionar destino final
        </button>
      </div>

      <p class="aviso destaque" id="modoMapaTexto">
        Modo atual: ponto de coleta
      </p>

      <div id="map"></div>

      <label for="qtdPassageiros">Quantidade de passageiros</label>
      <input
        type="number"
        id="qtdPassageiros"
        min="1"
        placeholder="Ex: 4"
      />

      <label for="horarioPrevisto">Horário previsto</label>
      <input type="time" id="horarioPrevisto" />

      <label for="observacao">Observação</label>
      <textarea
        id="observacao"
        placeholder="Ex: esperar próximo à paragem principal"
      ></textarea>

      <button type="button" class="btn-verde" onclick="adicionarPonto()">
        Adicionar ponto
      </button>
    </section>

    <section class="card">
      <h2>Pontos cadastrados</h2>

      <div id="listaPontos"></div>

      <button type="button" class="btn-azul" onclick="exportarCSV()">
        Exportar Excel / CSV
      </button>

      <button type="button" class="btn-vermelho" onclick="limparTudo()">
        Limpar rota atual
      </button>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
