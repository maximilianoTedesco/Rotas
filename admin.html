<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ADM | Rotas Algarve</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Painel ADM</h1>
      <p>Cadastro de motoristas, pontos fixos e montagem de rotas</p>

      <div class="top-actions">
        <button type="button" class="btn-azul" onclick="irMotorista()">
          Ver tela do motorista
        </button>

        <button type="button" class="btn-cinza" onclick="sair()">
          Sair
        </button>
      </div>
    </header>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloCadastrarMotorista')">
        🚐 Cadastrar motorista
      </button>

      <div class="modulo-conteudo" id="moduloCadastrarMotorista">
        <label for="nomeMotorista">Nome do motorista</label>
        <input type="text" id="nomeMotorista" placeholder="Ex: João Silva" />

        <label for="emailMotorista">E-mail do motorista</label>
        <input type="email" id="emailMotorista" placeholder="Ex: motorista@email.com" />

        <label for="senhaMotorista">Senha provisória</label>
        <input type="password" id="senhaMotorista" placeholder="Mínimo 6 caracteres" />

        <button type="button" class="btn-verde" onclick="criarMotorista()">
          Criar motorista
        </button>

        <p class="aviso">
          Após criar o motorista, ele poderá entrar pela tela de login usando o e-mail e a senha cadastrados.
        </p>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloGerenciarMotoristas')">
        👥 Gerenciar motoristas
      </button>

      <div class="modulo-conteudo" id="moduloGerenciarMotoristas">
        <div id="listaMotoristas">
          <p>Carregando motoristas...</p>
        </div>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloCadastrarPonto')">
        📍 Cadastrar ponto fixo
      </button>

      <div class="modulo-conteudo" id="moduloCadastrarPonto">
        <label for="nomePontoBase">Nome do ponto</label>
        <input type="text" id="nomePontoBase" placeholder="Ex: Paragem Praia da Rocha" />

        <label for="enderecoPontoBase">Endereço / referência</label>
        <input type="text" id="enderecoPontoBase" placeholder="Ex: Em frente à paragem principal" />

        <label for="coordenadasPontoBase">Coordenadas</label>
        <input type="text" id="coordenadasPontoBase" readonly placeholder="Clique no mapa para selecionar" />

        <p class="aviso destaque">Clique no mapa para selecionar o ponto fixo.</p>

        <div id="map"></div>

        <button type="button" class="btn-verde" onclick="salvarPontoBase()">
          Salvar ponto fixo
        </button>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloPontosCadastrados')">
        📋 Pontos fixos cadastrados
      </button>

      <div class="modulo-conteudo" id="moduloPontosCadastrados">
        <div id="listaPontosBase"></div>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloCriarRota')">
        🛣️ Criar / atualizar rota
      </button>

      <div class="modulo-conteudo" id="moduloCriarRota">
        <label for="nomeRota">Nome da rota</label>
        <input type="text" id="nomeRota" placeholder="Ex: Rota Manhã Portimão - Hotéis" />

        <label for="dataRota">Data</label>
        <input type="date" id="dataRota" />

        <label for="horarioInicio">Horário inicial</label>
        <input type="time" id="horarioInicio" />

        <label for="motoristaRota">Motorista responsável</label>
        <select id="motoristaRota">
          <option value="">Selecione o motorista</option>
        </select>

        <label for="destinoNome">Destino final</label>
        <input type="text" id="destinoNome" placeholder="Ex: Tivoli Carvoeiro" />

        <label for="destinoCoordenadas">Coordenadas do destino final</label>
        <input type="text" id="destinoCoordenadas" readonly placeholder="Use o botão abaixo e clique no mapa" />

        <button type="button" class="btn-cinza" onclick="ativarModoDestino()">
          Selecionar destino final no mapa
        </button>

        <button type="button" class="btn-verde" onclick="salvarRota()">
          Salvar / atualizar rota
        </button>

        <button type="button" class="btn-cinza" onclick="limparFormularioRota()">
          Nova rota em branco
        </button>

        <p class="aviso" id="rotaAtualTexto">Nenhuma rota carregada.</p>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloAdicionarPontoRota')">
        ➕ Adicionar ponto cadastrado na rota
      </button>

      <div class="modulo-conteudo" id="moduloAdicionarPontoRota">
        <label for="selectPontoBase">Ponto cadastrado</label>
        <select id="selectPontoBase"></select>

        <label for="horarioPrevisto">Horário previsto</label>
        <input type="time" id="horarioPrevisto" />

        <label for="qtdPassageiros">Quantidade de passageiros</label>
        <input type="number" id="qtdPassageiros" min="0" placeholder="Ex: 4" />

        <label for="observacao">Observação</label>
        <textarea id="observacao" placeholder="Ex: esperar junto à paragem"></textarea>

        <button type="button" class="btn-verde" onclick="adicionarPontoNaRota()">
          Adicionar à rota
        </button>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloRotaMontada')">
        ✅ Rota montada
      </button>

      <div class="modulo-conteudo" id="moduloRotaMontada">
        <div id="listaPontosRota"></div>

        <button type="button" class="btn-azul" onclick="abrirRotaCompleta()">
          Abrir rota completa no Google Maps
        </button>

        <button type="button" class="btn-vermelho" onclick="limparRotaAtual()">
          Limpar pontos desta rota
        </button>
      </div>
    </section>

    <section class="card modulo-card">
      <button type="button" class="modulo-titulo" onclick="toggleModulo('moduloGerenciarRotas')">
        🧭 Gerenciar rotas
      </button>

      <div class="modulo-conteudo" id="moduloGerenciarRotas">
        <label for="filtroStatusRotas">Filtrar por status</label>
        <select id="filtroStatusRotas" onchange="carregarGerenciamentoRotas()">
          <option value="todas">Todas</option>
          <option value="ativa">Ativas</option>
          <option value="finalizada">Finalizadas</option>
          <option value="cancelada">Canceladas</option>
        </select>

        <div id="listaGerenciamentoRotas">
          <p>Carregando rotas...</p>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js?v=5"></script>
</body>
</html>
