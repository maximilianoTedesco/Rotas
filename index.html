<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Rotas Algarve</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-bottom: 16px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #22c55e;
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .erro {
      display: none;
      background: #dc2626;
      padding: 12px;
      border-radius: 10px;
      margin-top: 15px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <h1>Rotas Algarve</h1>
    <p>Acesso administrativo e motorista</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Ex: admin@rotas.pt" />

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha" />

    <button onclick="fazerLogin()">Entrar</button>

    <div class="erro" id="erro">Email ou senha inválidos.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";
    const SUPABASE_KEY = "COLE_AQUI_SUA_SUPABASE_ANON_KEY";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    async function fazerLogin() {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const erro = document.getElementById("erro");

      erro.style.display = "none";

      if (!email || !senha) {
        erro.textContent = "Preencha email e senha.";
        erro.style.display = "block";
        return;
      }

      const { data: loginData, error: loginError } =
        await supabaseClient.auth.signInWithPassword({
          email: email,
          password: senha
        });

      if (loginError || !loginData.user) {
        erro.textContent = "Email ou senha inválidos.";
        erro.style.display = "block";
        return;
      }

      const { data: perfilData, error: perfilError } = await supabaseClient
        .from("perfis")
        .select("*")
        .eq("id", loginData.user.id)
        .eq("ativo", true)
        .single();

      if (perfilError || !perfilData) {
        erro.textContent = "Usuário sem perfil ativo.";
        erro.style.display = "block";
        return;
      }

      localStorage.setItem("usuarioLogado", perfilData.perfil);
      localStorage.setItem("usuarioNome", perfilData.nome || email);

      if (perfilData.perfil === "admin") {
        window.location.href = "admin.html";
        return;
      }

      if (perfilData.perfil === "motorista") {
        window.location.href = "motorista.html";
        return;
      }

      erro.textContent = "Perfil não autorizado.";
      erro.style.display = "block";
    }
  </script>
</body>
</html>
