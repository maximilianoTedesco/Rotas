<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Rotas Algarve</title>

  <link rel="stylesheet" href="admin.css?v=12" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Rotas Algarve</h1>
      <p>Acesso administrativo e motorista</p>
    </header>

    <section class="card">
      <h2>Entrar</h2>

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" />

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" />

      <button type="button" class="btn-azul" onclick="login()">
        Entrar
      </button>

      <p class="aviso" id="mensagemLogin"></p>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://sjkgbnncfigvgebghecb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_gD75EJXrTmgeO9wD-Db7LA_UTxXrHLv";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const mensagem = document.getElementById("mensagemLogin");

      mensagem.textContent = "";

      if (!email || !senha) {
        mensagem.textContent = "Informe e-mail e senha.";
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error || !data.session) {
        mensagem.textContent = "E-mail ou senha inválidos.";
        return;
      }

      const userId = data.session.user.id;

      const { data: perfil, error: erroPerfil } = await supabaseClient
        .from("perfis")
        .select("*")
        .eq("id", userId)
        .eq("ativo", true)
        .single();

      if (erroPerfil || !perfil) {
        mensagem.textContent = "Perfil não encontrado ou inativo.";
        await supabaseClient.auth.signOut();
        return;
      }

      if (perfil.perfil === "admin") {
        window.location.href = "admin.html";
        return;
      }

      if (perfil.perfil === "motorista") {
        window.location.href = "motorista.html";
        return;
      }

      mensagem.textContent = "Perfil sem permissão de acesso.";
      await supabaseClient.auth.signOut();
    }
  </script>
</body>
</html>
