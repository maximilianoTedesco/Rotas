<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motorista | Rotas Algarve</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #020617;
      color: white;
      padding: 16px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    header {
      background: #0f172a;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    header h1 {
      margin-bottom: 8px;
    }

    .rota-info {
      color: #cbd5e1;
      line-height: 1.5;
    }

    .ponto {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .ponto.coletado {
      background: #14532d;
      border-color: #22c55e;
    }

    .ponto.ausente {
      background: #7f1d1d;
      border-color: #ef4444;
    }

    .ponto h2 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .ponto p {
      margin-bottom: 7px;
      color: #e2e8f0;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-top: 5px;
      background: #facc15;
      color: #422006;
    }

    .botoes {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      border: none;
      padding: 15px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-maps {
      background: #2563eb;
      color: white;
    }

    .btn-verde {
      background: #22c55e;
      color: white;
    }

    .btn-vermelho {
      background: #ef4444;
      color: white;
    }

    .btn-cinza {
      background: #64748b;
      color: white;
    }

    .proximo-box {
      background: #facc15;
      color: #422006;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .proximo-box h2 {
      margin-bottom: 8px;
    }

    .sem-pontos {
      background: #1e293b;
      padding: 20px;
      border-radius: 18px;
      text-align: center;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Painel do Motorista</h1>
      <div class="rota-info" id="rotaInfo"></div>

      <br />

      <button class="btn-cinza" onclick="sair()">Sair</button>
    </header>

    <section id="proximoPonto"></section>

    <section id="listaPontos"></section>
  </div>

  <script>
    verificarLogin();

    function verificarLogin() {
      const usuario = localStorage.getItem("usuarioLogado");

      if (usuario !== "motorista" && usuario !== "admin") {
        window.location.href = "index.html";
      }
    }

    function buscarPontos() {
      return JSON.parse(localStorage.getItem("pontosColeta")) || [];
    }

    function salvarPontos(pontos) {
      localStorage.setItem("pontosColeta", JSON.stringify(pontos));
    }

    function carregarInfoRota() {
      const rota = JSON.parse(localStorage.getItem("rotaAtual")) || {};
      const rotaInfo = document.getElementById("rotaInfo");

      rotaInfo.innerHTML = `
        <p><strong>Rota:</strong> ${rota.nome || "Não definida"}</p>
        <p><strong>Data:</strong> ${rota.data || "Não definida"}</p>
        <p><strong>Horário inicial:</strong> ${rota.horarioInicio || "Não definido"}</p>
      `;
    }

    function listarPontosMotorista() {
      const pontos = buscarPontos();
      const lista = document.getElementById("listaPontos");

      if (pontos.length === 0) {
        lista.innerHTML = `
          <div class="sem-pontos">
            Nenhum ponto de coleta cadastrado pelo ADM.
          </div>
        `;

        document.getElementById("proximoPonto").innerHTML = "";
        return;
      }

      mostrarProximoPonto(pontos);

      lista.innerHTML = "";

      pontos.forEach((ponto, index) => {
        const linkMaps = `https://www.google.com/maps/dir/?api=1&destination=${ponto.latitude},${ponto.longitude}`;

        const div = document.createElement("div");
        div.className = `ponto ${ponto.status === "coletado" ? "coletado" : ""} ${ponto.status === "ausente" ? "ausente" : ""}`;

        div.innerHTML = `
          <h2>${index + 1}. ${ponto.nomePonto}</h2>
          <p><strong>Horário:</strong> ${ponto.horarioPrevisto}</p>
          <p><strong>Passageiros:</strong> ${ponto.qtdPassageiros}</p>
          <p><strong>Coordenadas:</strong> ${ponto.latitude}, ${ponto.longitude}</p>
          <p><strong>Observação:</strong> ${ponto.observacao || "Sem observação"}</p>
          <span class="status">${traduzirStatus(ponto.status)}</span>

          <div class="botoes">
            <button class="btn-maps" onclick="abrirMaps('${linkMaps}')">Abrir no Google Maps</button>
            <button class="btn-verde" onclick="alterarStatus(${ponto.id}, 'coletado')">Coletado</button>
            <button class="btn-vermelho" onclick="alterarStatus(${ponto.id}, 'ausente')">Ausente</button>
          </div>
        `;

        lista.appendChild(div);
      });
    }

    function mostrarProximoPonto(pontos) {
      const proximo = pontos.find(ponto => ponto.status === "pendente");
      const box = document.getElementById("proximoPonto");

      if (!proximo) {
        box.innerHTML = `
          <div class="proximo-box">
            <h2>Rota finalizada</h2>
            <p>Todos os pontos foram marcados como coletados ou ausentes.</p>
          </div>
        `;
        return;
      }

      const linkMaps = `https://www.google.com/maps/dir/?api=1&destination=${proximo.latitude},${proximo.longitude}`;

      box.innerHTML = `
        <div class="proximo-box">
          <h2>Próximo ponto</h2>
          <p><strong>${proximo.nomePonto}</strong></p>
          <p><strong>Horário:</strong> ${proximo.horarioPrevisto}</p>
          <p><strong>Passageiros:</strong> ${proximo.qtdPassageiros}</p>

          <div class="botoes">
            <button class="btn-maps" onclick="abrirMaps('${linkMaps}')">Ir para o próximo ponto</button>
          </div>
        </div>
      `;
    }

    function abrirMaps(link) {
      window.open(link, "_blank");
    }

    function alterarStatus(id, novoStatus) {
      const pontos = buscarPontos();

      const pontosAtualizados = pontos.map(ponto => {
        if (ponto.id === id) {
          return {
            ...ponto,
            status: novoStatus
          };
        }

        return ponto;
      });

      salvarPontos(pontosAtualizados);
      listarPontosMotorista();
    }

    function traduzirStatus(status) {
      if (status === "coletado") return "COLETADO";
      if (status === "ausente") return "AUSENTE";
      return "PENDENTE";
    }

    function sair() {
      localStorage.removeItem("usuarioLogado");
      window.location.href = "index.html";
    }

    carregarInfoRota();
    listarPontosMotorista();
  </script>
</body>
</html>
