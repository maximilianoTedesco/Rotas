<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Motorista | Rotas Algarve</title>

  <link rel="stylesheet" href="motorista.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Painel do Motorista</h1>

      <div class="rota-info" id="rotaInfo">
        Carregando rota...
      </div>

      <button type="button" class="btn-cinza" onclick="sair()">
        Sair
      </button>
    </header>

    <section id="proximoPonto"></section>

    <section id="rotaCompletaBox"></section>

    <section class="card">
      <h2>Todos os pontos da rota</h2>
      <div id="listaPontos"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="motorista.js"></script>
</body>
</html>
