<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristas | Rotas Algarve</title>

    <link rel="stylesheet" href="motoristas.css?v=1">
</head>

<body>

    <div class="container">

        <header class="topo">

            <div>
                <button class="btn-voltar" onclick="window.location='admin.html'">
                    ← Painel ADM
                </button>

                <h1>🚐 Motoristas</h1>
                <p>Gerenciamento de motoristas cadastrados</p>
            </div>

            <button class="btn-novo" onclick="abrirNovoMotorista()">
                + Novo motorista
            </button>

        </header>

        <section class="pesquisa-card">

            <input
                type="text"
                id="pesquisaMotorista"
                placeholder="Pesquisar por nome ou e-mail..."
                onkeyup="filtrarMotoristas()">

        </section>

        <section id="listaMotoristas">

            <div class="loading">
                Carregando motoristas...
            </div>

        </section>

    </div>

    <div id="modalMotorista" class="modal">

        <div class="modal-content">

            <h2 id="tituloModal">
                Novo motorista
            </h2>

            <label>Nome</label>
            <input type="text" id="nomeMotorista">

            <label>E-mail</label>
            <input type="email" id="emailMotorista">

            <label>Senha</label>
            <input type="password" id="senhaMotorista">

            <div class="acoes-modal">

                <button
                    class="btn-cancelar"
                    onclick="fecharModal()">
                    Cancelar
                </button>

                <button
                    class="btn-salvar"
                    onclick="salvarMotorista()">
                    Salvar
                </button>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="motoristas.js?v=2"></script>

</body>
</html>
